<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Information</title>
  <link rel="stylesheet" href="../style.css">
  <script type="module" src="../global.js"></script>
</head>
<body>
  

  <h1 class="page-title">Nikitha Kerudi: Contact Information</h1>

  <p class="page-subtitle">
    Feel free to reach out to me via LinkedIn or send me a message below.
  </p>

  <form action="mailto:nikithakerudi@gmail.com" method="POST" enctype="text/plain">
    <label>
      <span>Your Email:</span>
      <input type="email" name="email">
    </label>

    <label>
      <span>Subject:</span>
      <input name="subject">
    </label>

    <label>
      <span>Message:</span>
      <textarea name="body" rows="4"></textarea>
    </label>

    <button type="submit">Submit</button>
  </form>
</body>
</html>
